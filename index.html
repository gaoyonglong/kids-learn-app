<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="快乐识字 - 幼儿园小朋友学习汉字和数字的趣味应用">
  <meta name="theme-color" content="#ff9f43">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="快乐识字">

  <!-- PWA 配置 -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/images/icon.svg">

  <!-- 样式 -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/games.css">

  <title>快乐识字 - 幼儿学习应用</title>

  <style>
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #fff9f0 0%, #fff5e6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-icon {
      font-size: 80px;
      animation: bounce 1s ease infinite;
    }

    .loading-text {
      font-size: 24px;
      color: #2d3436;
      margin-top: 20px;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
      margin-top: 30px;
    }

    .loading-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #ff9f43;
      animation: bounce 0.6s ease infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.1s; }
    .loading-dot:nth-child(3) { animation-delay: 0.2s; }
  </style>
</head>
<body>
  <!-- 加载页面 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-icon">🎓</div>
    <div class="loading-text">快乐识字</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <!-- 主应用 -->
  <div id="app"></div>

  <!-- 脚本 -->
  <script src="js/data.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/rewards.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/pet.js"></script>
  <script src="js/games/tracing.js"></script>
  <script src="js/games/matching.js"></script>
  <script src="js/games/drag.js"></script>
  <script src="js/games/listen.js"></script>
  <script src="js/app.js"></script>

  <script>
    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker 注册成功'))
        .catch(err => console.log('Service Worker 注册失败:', err));
    }

    // 隐藏加载页面
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loadingScreen').classList.add('hidden');
      }, 800);
    });

    // 点击任意位置解锁音频（移动端）
    document.addEventListener('click', function initAudio() {
      if (window.Speech && Speech.audioContext && Speech.audioContext.state === 'suspended') {
        Speech.audioContext.resume();
      }
    }, { once: true });
  </script>
</body>
</html>
