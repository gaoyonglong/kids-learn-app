<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="快乐识字 - 幼儿园小朋友学习汉字和数字的趣味应用">
  <meta name="theme-color" content="#ff9f43">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="快乐识字">

  <!-- PWA 配置 -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/images/icon.svg">

  <!-- 样式 -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/games.css">

  <title>快乐识字 - 幼儿学习应用</title>

  <style>
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #fff9f0 0%, #fff5e6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-icon {
      font-size: 80px;
      animation: bounce 1s ease infinite;
    }

    .loading-text {
      font-size: 24px;
      color: #2d3436;
      margin-top: 20px;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
      margin-top: 30px;
    }

    .loading-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #ff9f43;
      animation: bounce 0.6s ease infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.1s; }
    .loading-dot:nth-child(3) { animation-delay: 0.2s; }

    /* 音频解锁按钮 */
    .audio-unlock-btn {
      margin-top: 30px;
      padding: 15px 40px;
      background: linear-gradient(135deg, #ff9f43, #e17055);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 159, 67, 0.4);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .audio-unlock-btn:active {
      transform: scale(0.95);
    }

    .audio-unlock-btn.success {
      background: linear-gradient(135deg, #00b894, #00a187);
    }
  </style>
</head>
<body>
  <!-- 加载页面 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-icon">🎓</div>
    <div class="loading-text">快乐识字</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
    <button class="audio-unlock-btn" id="audioUnlockBtn">
      <span>🔊</span>
      <span>点击开启声音</span>
    </button>
  </div>

  <!-- 主应用 -->
  <div id="app"></div>

  <!-- 脚本 -->
  <script src="js/data.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/rewards.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/pet.js"></script>
  <script src="js/games/tracing.js"></script>
  <script src="js/games/matching.js"></script>
  <script src="js/games/drag.js"></script>
  <script src="js/games/listen.js"></script>
  <script src="js/app.js"></script>

  <script>
    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker 注册成功'))
        .catch(err => console.log('Service Worker 注册失败:', err));
    }

    // 音频解锁按钮
    const audioBtn = document.getElementById('audioUnlockBtn');
    let audioUnlocked = false;

    audioBtn.addEventListener('click', async function unlockAudio() {
      if (audioUnlocked) return;

      try {
        // 解锁音频
        if (window.Speech) {
          await Speech.unlock();
          // 测试播放
          Speech.playSound('star');
          await Speech.speak('声音已开启', 1.0, 1.2);
        }

        audioUnlocked = true;
        audioBtn.classList.add('success');
        audioBtn.innerHTML = '<span>✓</span><span>声音已开启</span>';

        // 延迟隐藏加载页面
        setTimeout(() => {
          document.getElementById('loadingScreen').classList.add('hidden');
        }, 1000);
      } catch (e) {
        console.warn('音频解锁失败:', e);
        // 即使失败也进入应用
        setTimeout(() => {
          document.getElementById('loadingScreen').classList.add('hidden');
        }, 500);
      }
    }, { once: true });

    // 备用：点击屏幕任意位置解锁
    document.addEventListener('click', function() {
      if (window.Speech) Speech.unlock();
    }, { once: true });

    document.addEventListener('touchstart', function() {
      if (window.Speech) Speech.unlock();
    }, { once: true });
  </script>
</body>
</html>
